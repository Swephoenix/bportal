<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanslihuset - Beställningsportal</title>
  <style>
    :root {
      --bg: #edf3f7;
      --panel: rgba(255, 255, 255, 0.76);
      --panel-border: rgba(255, 255, 255, 0.84);
      --text: #15202b;
      --muted: #4a5c6d;
      --accent: #b8892d;
      --accent-deep: #7c5b1f;
      --shadow: 0 30px 70px rgba(45, 67, 84, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 58%, #dfe8ee 100%);
      color: var(--text);
      /* Bytte till ett modernt systemtypsnitt för IT-system */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .splash {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
      padding: 24px;
    }

    /* Video & Bakgrunds-styling behållen från din originalkod */
    .splash-video,
    .splash-overlay,
    .splash-noise {
      position: absolute;
      inset: 0;
    }

    .splash-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.9) contrast(0.96) brightness(1.18);
      transform: scale(1.04);
    }

    .splash-overlay {
      background:
        linear-gradient(115deg, rgba(247, 251, 253, 0.82) 0%, rgba(255, 255, 255, 0.46) 40%, rgba(237, 243, 247, 0.78) 100%),
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.55), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(184, 137, 45, 0.16), transparent 22%),
        radial-gradient(circle at 55% 76%, rgba(173, 194, 207, 0.34), transparent 42%);
    }

    .splash-noise {
      pointer-events: none;
      opacity: 0.16;
      mix-blend-mode: screen;
      background-image:
        linear-gradient(transparent 0, rgba(255, 255, 255, 0.12) 50%, transparent 100%),
        repeating-linear-gradient(90deg, transparent 0 2px, rgba(255, 255, 255, 0.08) 2px 3px);
    }

    .splash-card {
      position: relative;
      z-index: 1;
      width: min(100%, 640px); /* Något smalare för bättre läsbarhet */
      padding: clamp(32px, 5vw, 48px);
      border-radius: 24px;
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), var(--panel));
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
      animation: cardIn 800ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .brand-mark {
      width: clamp(90px, 15vw, 120px);
      padding: 16px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 12px 30px rgba(21, 32, 43, 0.08);
      margin-bottom: -10px;
    }

    .brand-mark img {
      display: block;
      width: 100%;
      height: auto;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .brand-copy p {
      margin: 8px 0 0 0;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 400;
    }

    .loader-block {
      width: 100%;
      max-width: 320px;
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .progress {
      position: relative;
      height: 6px; /* Lite slimmare, modernare progressbar */
      border-radius: 999px;
      background: rgba(21, 32, 43, 0.08);
      overflow: hidden;
    }

    .progress > span {
      position: absolute;
      inset: 0;
      transform-origin: left center;
      transform: scaleX(0);
      background: linear-gradient(90deg, var(--accent-deep) 0%, var(--accent) 50%, #e7c36f 100%);
      transition: transform 90ms linear;
    }

    .loader-label {
      margin: 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .is-exiting .splash-card {
      opacity: 0;
      transform: translateY(-10px) scale(0.98);
      transition: opacity 400ms ease, transform 400ms ease;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .splash-card,
      .is-exiting .splash-card {
        animation: none;
        transition: none;
      }
      .progress > span {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="splash" aria-label="Kanslihuset laddningsskärm">
    <video class="splash-video" autoplay muted loop playsinline poster="kanslihuset_logo.svg" aria-hidden="true">
      <source src="kanslihuset.mp4" type="video/mp4">
    </video>
    <div class="splash-overlay" aria-hidden="true"></div>
    <div class="splash-noise" aria-hidden="true"></div>

    <section class="splash-card">
      <div class="brand-mark" aria-hidden="true">
        <img src="kanslihuset_logo.svg" alt="Kanslihuset Logotyp">
      </div>
      
      <div class="brand-copy">
        <h1>Välkommen till Kanslihuset</h1>
        <p>Beställningsportalen</p>
      </div>

      <!-- aria-live="polite" läser upp för skärmläsare när portalen faktiskt öppnas, istället för alla steg -->
      <div class="loader-block" aria-live="polite">
        <div class="progress" aria-hidden="true">
          <span id="progressFill"></span>
        </div>
        <p class="loader-label" id="statusText" aria-hidden="true">Ansluter till servern...</p>
      </div>
    </section>
  </main>

  <script>
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const splash = document.querySelector('.splash');
    
    const motionReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    // Sänkt från 3.2s till 2.2s för att minska onödig väntetid. 
    // Idealt bör detta knytas till en faktisk window.onload istället för en timeout.
    const duration = motionReduced ? 0 : 2200; 
    const start = performance.now();
    let redirected = false;

    function goToPortal() {
      if (redirected) return;
      redirected = true;
      splash.classList.add('is-exiting');
      
      // Detta uppdaterar den osynliga skärmläsar-texten också
      document.querySelector('.loader-block').setAttribute('aria-label', 'Omdirigerar till beställningsportalen');
      
      window.setTimeout(() => {
        window.location.href = 'index.html';
      }, 400);
    }

    function animate(now) {
      if (duration === 0) {
        goToPortal();
        return;
      }

      const progress = Math.min((now - start) / duration, 1);
      
      // Easing för progressbaren gör att den stannar upp lite och känns mer "verklig"
      const easeProgress = 1 - Math.pow(1 - progress, 3);
      progressFill.style.transform = `scaleX(${easeProgress})`;

      // Dynamisk text som faktiskt visar ett fiktivt flöde (psykologisk UX)
      if (progress < 0.30) {
        statusText.textContent = 'Ansluter till säker miljö...';
      } else if (progress < 0.65) {
        statusText.textContent = 'Hämtar profil och behörigheter...';
      } else if (progress < 0.95) {
        statusText.textContent = 'Förbereder portalen...';
      } else {
        statusText.textContent = 'Öppnar...';
      }

      if (progress >= 1) {
        goToPortal();
        return;
      }

      window.requestAnimationFrame(animate);
    }

    window.requestAnimationFrame(animate);
  </script>
</body>
</html>
